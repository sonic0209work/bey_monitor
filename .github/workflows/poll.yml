name: Poll for restock

# GitHub throttles the `schedule` trigger itself on low-traffic public repos to
# roughly hourly no matter how tight the cron is (observed: */5 and */10 both
# landed ~60-90 min apart in practice). Dispatched runs (workflow_dispatch) do
# NOT get that treatment - they start almost immediately, same as a manual run.
#
# So the real 5-minute cadence comes from the job itself: it loops internally
# with `sleep 300` for ~5.5h (just under the 6h per-job limit), then re-arms
# itself by dispatching a fresh run via the API. The `schedule` below (every 6h)
# is only a safety net in case that self-dispatch chain ever breaks - it's
# deliberately loose (not every 5/10 min) so it doesn't stack up queued runs
# behind the long-running loop under the concurrency group.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: monitor-loop
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll every 5 minutes for ~5.5h
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          END=$((SECONDS + 330 * 60))
          while [ $SECONDS -lt $END ]; do
            python3 monitor.py || echo "monitor.py failed this round, will retry next loop"

            git add state/state.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update monitor state" || true
              git pull --rebase || true
              git push || true
            fi

            sleep 300
          done

      - name: Re-arm the next run
        if: always()
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/poll.yml/dispatches" \
            -d '{"ref":"main"}'
